project:
  name: "Financial News Intelligence Dashboard"
  selected_track: "financial_news"
  language: "zh-CN"
  timezone: "Asia/Shanghai"
  random_seed: 42

paths:
  raw_news: "data/raw/news/raw_news.csv"
  cleaned_news: "data/interim/news/cleaned_news.csv"
  topic_labeled_news: "data/processed/news/topic_labeled_news.csv"
  sentiment_risk_news: "data/processed/news/sentiment_risk_news.csv"
  output_tables: "data/outputs/tables"
  figures: "data/outputs/figures"
  agent_inputs: "data/outputs/agent_inputs"
  docs: "docs"

output_files:
  tables:
    daily_news_volume: "daily_news_volume.csv"
    hourly_news_volume: "hourly_news_volume.csv"
    topic_heatmap_matrix: "topic_heatmap_matrix.csv"
    topic_burst_scores: "topic_burst_scores.csv"
    daily_sentiment_trend: "daily_sentiment_trend.csv"
    topic_sentiment_matrix: "topic_sentiment_matrix.csv"
    high_risk_events: "high_risk_events.csv"
  figures:
    daily_news_volume: "fig_daily_news_volume.png"
    intraday_news_flow: "fig_intraday_news_flow.png"
    topic_heatmap: "fig_topic_heatmap.html"
    topic_burst_ranking: "fig_topic_burst_ranking.png"
    sentiment_trend: "fig_sentiment_trend.png"
    topic_sentiment_heatmap: "fig_topic_sentiment_heatmap.html"
    risk_event_distribution: "fig_risk_event_distribution.png"
    high_risk_timeline: "fig_high_risk_timeline.html"
  figures_bilingual:
    daily_news_volume: "fig_daily_news_volume_bilingual.png"
    intraday_news_flow: "fig_intraday_news_flow_bilingual.png"
    topic_heatmap: "fig_topic_heatmap_bilingual.html"
    topic_burst_ranking: "fig_topic_burst_ranking_bilingual.png"
    sentiment_trend: "fig_sentiment_trend_bilingual.png"
    topic_sentiment_heatmap: "fig_topic_sentiment_heatmap_bilingual.html"
    risk_event_distribution: "fig_risk_event_distribution_bilingual.png"
    high_risk_timeline: "fig_high_risk_timeline_bilingual.html"
    figure_file_index: "figure_file_index.md"
  agent_inputs:
    daily_topic_summary: "daily_topic_summary.json"
    topic_burst_summary: "topic_burst_summary.json"
    sentiment_risk_summary: "sentiment_risk_summary.json"
    high_risk_events: "high_risk_events.json"
    daily_financial_news_briefing: "daily_financial_news_briefing.md"
    daily_financial_news_briefing_bilingual: "daily_financial_news_briefing_bilingual.md"
    coze_knowledge_base_financial_news: "coze_knowledge_base_financial_news.md"
  reports:
    final_report_bilingual: "financial_news_intelligence_final_report_bilingual.docx"

crawler:
  news_source: "eastmoney_7x24"
  request_delay_seconds: 1.5
  max_pages: 20
  page_size: 50
  fast_column: 102
  timeout_seconds: 10
  max_retries: 3
  encoding: "utf-8"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36"
  obey_public_access_limits: true

news:
  min_sample_size: 500
  validation_sample_size: 50
  target_days: 14
  use_full_text: false
  deduplicate_by:
    - "title_clean"
    - "url"
  required_fields:
    - "news_id"
    - "title"
    - "publish_time_raw"
    - "source"
    - "raw_text"
    - "crawl_time"

cleaning:
  min_text_length: 5
  remove_source_prefix: true
  remove_html_tags: true
  normalize_punctuation: true
  fallback_publish_time_to_crawl_time: false

